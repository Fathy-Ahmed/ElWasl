<header class="glass-header" id="app-header">
  <div class="header-container container">
    <!-- Top Right Group: Logo & Navigation Menu -->
    <div class="right-header-group">
      <a routerLink="/" class="logo-area" id="nav-logo">
        <img src="/logo.png" alt="Dar ElWasl Logo" class="header-logo-img">
      </a>

      <!-- Right Navigation Menu (Arabic text, RTL aligned) -->
      <nav class="nav-links" id="main-nav">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" id="nav-home">الرئيسية</a>
        <a routerLink="/books" routerLinkActive="active" id="nav-books">إصداراتنا</a>
        <a routerLink="/audiobooks" routerLinkActive="active" id="nav-audiobooks">الكتب الصوتية</a>
        <a routerLink="/games" routerLinkActive="active" id="nav-games">ألعاب الورق</a>
        <a routerLink="/about-us" routerLinkActive="active" id="nav-about">عن الدار</a>
        <a routerLink="/contract-with-us" routerLinkActive="active" id="nav-contracting">للمؤلفين</a>
        <a routerLink="/contact-us" routerLinkActive="active" id="nav-contact">تواصل معنا</a>
      </nav>
    </div>

    <!-- Top Left Group: Search, Cart & User Account -->
    <div class="left-header-group">
      <!-- Search Button -->
      <button mat-icon-button class="search-btn" id="nav-search-btn" aria-label="Search">
        <mat-icon>search</mat-icon>
      </button>

      <!-- Cart Button -->
      <a routerLink="/cart" mat-icon-button class="cart-btn" id="nav-cart-btn" aria-label="Shopping Cart">
        <mat-icon [matBadge]="cartService.totalItemsCount()" 
                  [matBadgeHidden]="cartService.totalItemsCount() === 0" 
                  matBadgeColor="accent">
          shopping_cart
        </mat-icon>
      </a>

      <!-- Language switcher -->
      <app-language-switcher class="lang-switcher-widget"></app-language-switcher>

      <!-- Profile/Logout -->
      @if (authService.isAuthenticated()) {
        <a routerLink="/account" mat-icon-button class="profile-btn" id="nav-profile-btn" aria-label="Profile">
          <mat-icon>account_circle</mat-icon>
        </a>
        <button mat-icon-button color="warn" (click)="logout()" class="logout-btn" id="nav-logout-btn" aria-label="Logout">
          <mat-icon>exit_to_app</mat-icon>
        </button>
      } @else {
        <a routerLink="/auth/login" mat-flat-button color="primary" class="login-btn" id="nav-login-btn">
          تسجيل الدخول
        </a>
      }
    </div>
  </div>

  <!-- Lower Header: Headline & CTA Button (Homepage only) -->
  @if (isHomePage()) {
    <div class="lower-header-bar">
      <div class="container lower-header-container">
        <div class="lower-header-right">
          <h2 class="lower-headline">اكتشف عوالم جديدة مع دار الوصل</h2>
        </div>
        <div class="lower-header-left">
          <a routerLink="/books" mat-flat-button class="lower-cta-btn" id="lower-browse-btn">
            تصفح الروايات الآن
          </a>
        </div>
      </div>
    </div>
  }
</header>
